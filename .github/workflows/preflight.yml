name: preflight
run-name: "banyancode preflight (${{ github.ref_name }})"

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  preflight:
    name: Validate release readiness
    runs-on: ubuntu-latest
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node + npm auth probe
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: v
        working-directory: packages/opencode
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version $VERSION from packages/opencode/package.json"

      - name: Mark package scripts executable
        run: git ls-files -z 'packages/*/script/*.{ts,mjs,js}' | xargs -0 -I {} chmod +x {}

      - name: npm auth check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is missing. Add the secret before tagging a release."
            echo "BLOCKER_NPM_TOKEN=missing" >> "$GITHUB_OUTPUT"
          else
            if ! npm whoami; then
              echo "::error::NPM_TOKEN is set but npm whoami failed; the token may be invalid."
              echo "BLOCKER_NPM_TOKEN=invalid" >> "$GITHUB_OUTPUT"
            else
              echo "npm auth OK ($(npm whoami))"
            fi
          fi

      - name: Build locally (--single)
        env:
          OPENCODE_VERSION: ${{ steps.v.outputs.version }}
          OPENCODE_RELEASE: 'false'
          OPENCODE_CHANNEL: latest
        run: bun ./packages/opencode/script/build.ts --single

      - name: Smoke-test binary
        shell: bash
        run: |
          set -euo pipefail
          bin="$(ls -d packages/opencode/dist/banyancode-*-x64/bin/banyancode 2>/dev/null | head -1 || true)"
          if [ -z "$bin" ]; then
            echo "::error::No banyancode-x64 binary produced. Check build logs."
            exit 1
          fi
          "$bin" --version || true
          echo "Smoke-tested: $bin"

      - name: Validate Azure signing secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
        run: |
          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ] || [ -z "$AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" ] || [ -z "$AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE" ] || [ -z "$AZURE_TRUSTED_SIGNING_ENDPOINT" ]; then
            echo "::warning::Azure signing secrets missing; Windows binaries will be unsigned."
          else
            echo "Azure signing secrets present."
          fi

      - name: Summarize
        run: |
          echo "PREFLIGHT SUMMARY"
          echo "-----------------"
          echo "version: ${{ steps.v.outputs.version }}"
          ls -la packages/opencode/dist/banyancode-*.* 2>/dev/null || true
          ls -la packages/opencode/dist/banyancode-*/bin/banyancode 2>/dev/null || true
          echo "AUR + Homebrew tap pushes are out of scope for this release (npm-only)."
