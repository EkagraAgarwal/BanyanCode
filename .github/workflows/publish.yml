name: publish
run-name: "${{ format('banyancode release {0}', inputs.version || github.ref_name) }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 26.07.1). Leave empty to read from packages/opencode/package.json."
        required: false
        default: ""

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write
  contents: write

env:
  WRAPPER_NAME: banyancode

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref_name }}

      - name: Resolve version
        id: resolve
        working-directory: packages/opencode
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark package scripts executable
        run: git ls-files -z 'packages/*/script/*.{ts,mjs,js}' | xargs -0 -I {} chmod +x {}

  build:
    name: Build BanyanCode ${{ matrix.target }}
    needs: version
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: linux-x64
            os-suffix: linux
          - runs-on: ubuntu-latest
            target: linux-x64-baseline
            os-suffix: linux
          - runs-on: ubuntu-latest
            target: linux-x64-musl
            os-suffix: linux
          - runs-on: ubuntu-latest
            target: linux-x64-baseline-musl
            os-suffix: linux
          - runs-on: ubuntu-latest
            target: linux-arm64
            os-suffix: linux
          - runs-on: ubuntu-latest
            target: linux-arm64-musl
            os-suffix: linux
          - runs-on: macos-14
            target: darwin-x64
            os-suffix: darwin
          - runs-on: macos-14
            target: darwin-x64-baseline
            os-suffix: darwin
          - runs-on: macos-latest
            target: darwin-arm64
            os-suffix: darwin
          - runs-on: windows-latest
            target: windows-x64
            os-suffix: windows
          - runs-on: windows-latest
            target: windows-x64-baseline
            os-suffix: windows
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-tags: true
          ref: ${{ github.ref_name }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          install-flags: '--os="*" --cpu="*"'

      - name: Build ${{ matrix.target }}
        run: bun ./packages/opencode/script/build.ts --target=${{ matrix.target }} --skip-install
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ github.event_name == 'push' }}
          OPENCODE_CHANNEL: latest

      - name: Package macOS binaries
        if: matrix.os-suffix == 'darwin'
        working-directory: packages/opencode/dist
        run: |
          cd banyancode-${{ matrix.target }}/bin
          zip -r ../../banyancode-${{ matrix.target }}.zip *

      - name: Upload CLI artifacts (Unix)
        if: matrix.os-suffix != 'windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: banyancode-${{ matrix.target }}
          path: |
            packages/opencode/dist/banyancode-${{ matrix.target }}
            packages/opencode/dist/banyancode-${{ matrix.target }}.tar.gz
            packages/opencode/dist/banyancode-${{ matrix.target }}.zip

      - name: Upload Windows CLI artifact
        if: matrix.os-suffix == 'windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: banyancode-${{ matrix.target }}
          path: |
            packages/opencode/dist/banyancode-${{ matrix.target }}
            packages/opencode/dist/banyancode-${{ matrix.target }}.zip

  sign-windows:
    name: Optional Windows signing
    needs:
      - version
      - build
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          ref: ${{ github.ref_name }}

      - name: Download Windows CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: banyancode-windows-x64
          path: packages/opencode/dist

      - name: Decide signing path
        id: signing
        shell: pwsh
        run: |
          $hasSigning = $env:AZURE_CLIENT_ID -and $env:AZURE_TENANT_ID -and $env:AZURE_SUBSCRIPTION_ID -and $env:AZURE_TRUSTED_SIGNING_ACCOUNT_NAME -and $env:AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE -and $env:AZURE_TRUSTED_SIGNING_ENDPOINT
          if ($hasSigning) { echo "enabled=true" >> $env:GITHUB_OUTPUT } else { echo "enabled=false" >> $env:GITHUB_OUTPUT }
          Write-Host "Azure signing configured: $hasSigning"

      - name: Azure login
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sign BanyanCode Windows binaries
        if: steps.signing.outputs.enabled == 'true'
        uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
        with:
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}\packages\opencode\dist\banyancode-windows-x64\bin\banyancode.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Repack BanyanCode Windows archive (signed)
        if: steps.signing.outputs.enabled == 'true'
        working-directory: packages/opencode/dist
        shell: pwsh
        run: |
          Compress-Archive -Path "banyancode-windows-x64\bin\*" -DestinationPath "banyancode-windows-x64.zip" -Force

      - name: Repack BanyanCode Windows archive (unsigned fallback)
        if: steps.signing.outputs.enabled != 'true'
        working-directory: packages/opencode/dist
        shell: pwsh
        run: |
          Write-Host "::warning::Windows binaries are NOT signed (Azure credentials missing). Repacking unsigned artifacts."
          Compress-Archive -Path "banyancode-windows-x64\bin\*" -DestinationPath "banyancode-windows-x64.zip" -Force

      - name: Upload signed BanyanCode Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: banyancode-windows-x64
          path: |
            packages/opencode/dist/banyancode-windows-x64.zip
            packages/opencode/dist/banyancode-windows-x64

  publish:
    name: Publish to npm + AUR + Homebrew tap
    needs:
      - version
      - build
      - sign-windows
    if: always() && !failure() && !cancelled() && needs.version.outputs.version != ''
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      AUR_KEY: ${{ secrets.AUR_KEY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-tags: true
          ref: ${{ github.ref_name }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node + npm registry auth
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Configure git committer for release
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Download BanyanCode CLI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: banyancode-*
          merge-multiple: true
          path: packages/opencode/dist

      - name: Upload all release artifacts to GitHub release (draft, prerelease)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading new assets."
          else
            gh release create "$TAG" --draft --prerelease --generate-notes --title "BanyanCode ${{ needs.version.outputs.version }}" --repo "${{ github.repository }}"
          fi
          shopt -s nullglob
          files=(packages/opencode/dist/banyancode-*.*)
          if (( ${#files[@]} > 0 )); then
            gh release upload "$TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"
          fi

      - name: Publish BanyanCode to npm + AUR + tap
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: 'true'
          OPENCODE_CHANNEL: latest
          GH_REPO: ${{ github.repository }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun ./packages/opencode/script/publish.ts

      - name: Publish release (finalize draft)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.version.outputs.version }}" --draft=false --repo "${{ github.repository }}" || true
