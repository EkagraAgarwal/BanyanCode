name: publish
run-name: "${{ format('banyancode release {0}', github.ref_name) }}"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write
  contents: write

jobs:
  version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Determine release version
        id: version
        run: ./script/version.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          OPENCODE_CHANNEL: latest
          OPENCODE_VERSION: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          OPENCODE_BUMP: ""

    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-cli:
    needs: version
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: blacksmith-4vcpu-ubuntu-2404
            target: linux-x64
            os-suffix: linux
            artifact: banyancode-cli
          - runs-on: blacksmith-4vcpu-ubuntu-2404
            target: linux-arm64
            os-suffix: linux
            artifact: banyancode-cli
          - runs-on: macos-14
            target: darwin-x64
            os-suffix: darwin
            artifact: banyancode-cli
          - runs-on: macos-latest
            target: darwin-arm64
            os-suffix: darwin
            artifact: banyancode-cli
          - runs-on: windows-latest
            target: windows-x64
            os-suffix: windows
            artifact: banyancode-cli-windows
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-tags: true

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build BanyanCode CLI
        run: ./packages/opencode/script/build.ts
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}
          OPENCODE_CHANNEL: ${{ (github.ref_name == 'beta' && 'beta') || 'latest' }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI artifacts (non-Windows)
        if: matrix.os-suffix != 'windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: banyancode-cli
          path: |
            packages/opencode/dist/banyancode-linux-x64
            packages/opencode/dist/banyancode-linux-arm64
            packages/opencode/dist/banyancode-darwin-x64
            packages/opencode/dist/banyancode-darwin-arm64
            packages/opencode/dist/banyancode-linux-*.zip
            packages/opencode/dist/banyancode-linux-*.tar.gz
            packages/opencode/dist/banyancode-darwin-*.zip
            packages/opencode/dist/banyancode-darwin-*.tar.gz

      - name: Upload Windows CLI artifact
        if: matrix.os-suffix == 'windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: banyancode-cli-windows
          path: packages/opencode/dist/banyancode-windows*

  sign-cli-windows:
    needs:
      - build-cli
      - version
    if: github.repository == 'EkagraAgarwal/BanyanCode'
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Download Windows CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: banyancode-cli-windows
          path: packages/opencode/dist

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sign BanyanCode Windows binaries
        uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}\packages\opencode\dist\banyancode-windows-x64\bin\banyancode.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify BanyanCode Windows signatures
        shell: pwsh
        run: |
          $file = "${{ github.workspace }}\packages\opencode\dist\banyancode-windows-x64\bin\banyancode.exe"
          $sig = Get-AuthenticodeSignature $file
          if ($sig.Status -ne "Valid") {
            throw "Invalid signature for ${file}: $($sig.Status)"
          }

      - name: Repack BanyanCode Windows archive
        working-directory: packages/opencode/dist
        shell: pwsh
        run: |
          Compress-Archive -Path "banyancode-windows-x64\bin\*" -DestinationPath "banyancode-windows-x64.zip" -Force

      - name: Upload signed BanyanCode Windows assets to release
        if: needs.version.outputs.release != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.version.outputs.version }}" `
            "${{ github.workspace }}\packages\opencode\dist\banyancode-windows-x64.zip" `
            --clobber `
            --repo "${{ needs.version.outputs.repo }}"

      - name: Upload signed BanyanCode Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: banyancode-cli-signed-windows
          path: |
            packages/opencode/dist/banyancode-windows-x64

  publish:
    needs:
      - version
      - build-cli
      - sign-cli-windows
    if: always() && !failure() && !cancelled()
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-tags: true

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Download BanyanCode CLI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: banyancode-cli
          path: packages/opencode/dist

      - name: Download signed BanyanCode Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: banyancode-cli-signed-windows
          path: packages/opencode/dist

      - name: Configure git committer for release
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}"
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Setup SSH for AUR
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          git config --global user.email "banyancode@users.noreply.github.com"
          git config --global user.name "banyancode"
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts || true

      - name: Publish release
        run: ./script/publish.ts
        env:
          OPENCODE_VERSION: ${{ needs.version.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.version.outputs.release }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          NPM_CONFIG_PROVENANCE: false
